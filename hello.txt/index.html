<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First Website</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    max-width: 400px;
}

h1 {
    color: #333;
}

p {
    color: #555;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: #4facfe;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    background: #2f80ed;
    transform: scale(1.05);
}
</style>

</head>

<body>

<div class="container">
    <h1>Hello World 🌍</h1>
    <p>This thing is pretty great!</p>
    <button onclick="sayHello()">pendot ka dete</button>
</div>

<script>
function sayHello() {
    alert("Hello! Thanks for visiting my website.");
}
</script>

</body>
</html>
